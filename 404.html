<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nature Patch Camp</title>
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/#/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
      );
    </script>
  </head>
  <body>Redirecting...</body>
</html>
